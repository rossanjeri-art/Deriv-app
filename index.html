<!DOCTYPE html>
<html>
<head>
  <title>Deriv Multi Index Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      background: #162033;
      padding: 10px;
      border-radius: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .big {
      font-size: 24px;
      font-weight: bold;
    }

    .green { color: #22c55e; }
    .orange { color: #f59e0b; }
    .red { color: #ef4444; }
  </style>
</head>

<body>

<h2>Deriv Multi Index Dashboard</h2>

<div class="grid" id="dashboard"></div>

<script>
const symbols = ["R_10","R_25","R_50","R_75","R_100"];

let data = {};

symbols.forEach(s => {
  data[s] = {
    ws: null,
    counts: Array(10).fill(0),
    ticks: [],
    lastDigit: "-"
  };
  connect(s);
});

function connect(symbol) {
  let ws = new WebSocket("wss://ws.derivws.com/websockets/v3");

  data[symbol].ws = ws;

  ws.onopen = function () {
    ws.send(JSON.stringify({
      ticks: symbol,
      subscribe: 1
    }));
  };

  ws.onmessage = function (msg) {
    let res = JSON.parse(msg.data);

    if (res.tick) {
      let price = res.tick.quote;
      let digit = parseInt(String(Math.floor(price)).slice(-1));

      let d = data[symbol];

      d.lastDigit = digit;
      d.counts[digit]++;
      d.ticks.push(digit);

      if (d.ticks.length > 100) {
        let removed = d.ticks.shift();
        d.counts[removed]--;
      }

      render();
    }
  };
}

function render() {
  let html = "";

  symbols.forEach(symbol => {
    let d = data[symbol];

    let hot = d.counts.indexOf(Math.max(...d.counts));
    let cold = d.counts.indexOf(Math.min(...d.counts));

    let total = d.ticks.length;

    let imbalance = 0;
    for (let i = 0; i < 10; i++) {
      imbalance += Math.abs(d.counts[i] - total/10);
    }

    let randomness = Math.min(100, (1 - (imbalance / (total + 1))) * 100);

    html += `
      <div class="card">
        <h3>${symbol}</h3>

        <div class="row">
          <div>Last Digit:</div>
          <div class="big">${d.lastDigit}</div>
        </div>

        <div class="row">
          <div>Hot Digit:</div>
          <div class="green">${hot} (${d.counts[hot]})</div>
        </div>

        <div class="row">
          <div>Cold Digit:</div>
          <div class="red">${cold} (${d.counts[cold]})</div>
        </div>

        <div class="row">
          <div>Randomness:</div>
          <div class="${randomness > 70 ? 'green' : randomness > 40 ? 'orange' : 'red'}">
            ${randomness.toFixed(1)}%
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById("dashboard").innerHTML = html;
}
</script>

</body>
</html>
