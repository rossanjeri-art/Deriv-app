<!DOCTYPE html>
<html>
<head>
  <title>Deriv Stable Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #070b14;
      color: white;
      text-align: center;
      padding: 10px;
    }

    .card {
      background: #111a2e;
      padding: 12px;
      border-radius: 12px;
      max-width: 420px;
      margin: auto;
    }

    .big { font-size: 22px; font-weight: bold; }
    .green { color: #22c55e; }
  </style>
</head>

<body>

<h2>Deriv Stable Dashboard</h2>

<div class="card">
  <div>Market: R_75</div>
  <div>Last Digit:</div>
  <div class="big" id="last">-</div>

  <div id="status">Connecting...</div>
</div>

<script>
let counts = Array(10).fill(0);

function connect() {
  let ws = new WebSocket("wss://ws.derivws.com/websockets/v3");

  ws.onopen = () => {
    document.getElementById("status").innerText = "Connected ✔";

    ws.send(JSON.stringify({
      ticks: "R_75",
      subscribe: 1
    }));
  };

  ws.onmessage = (msg) => {
    try {
      let res = JSON.parse(msg.data);
      if (!res.tick) return;

      let price = res.tick.quote;
      let digit = parseInt(String(Math.floor(price)).slice(-1));

      document.getElementById("last").innerText = digit;

    } catch (e) {
      document.getElementById("status").innerText = "Error reading data";
    }
  };

  ws.onerror = () => {
    document.getElementById("status").innerText = "Connection error";
  };
}

connect();
</script>

</body>
</html>
